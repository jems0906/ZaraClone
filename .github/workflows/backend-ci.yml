name: Backend CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test-backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: resume_matcher
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d resume_matcher"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/resume_matcher
      JWT_SECRET: ci-secret
      JWT_EXPIRES_IN: 7d

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Initialize database schema
        run: psql "$DATABASE_URL" -f backend/sql/schema.sql

      - name: Run backend unit tests
        run: npm test
        working-directory: backend

      - name: Start backend API
        run: npm run start --prefix backend &

      - name: Wait for health endpoint
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:4000/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Backend did not become healthy in time"
          exit 1

      - name: Run backend integration tests
        run: npm run test:integration
        working-directory: backend
