databases:
  - name: zaraclone-db
    databaseName: resume_matcher
    user: resume_matcher_user

services:
  - type: web
    name: zaraclone-web
    runtime: node
    plan: free
    buildCommand: npm ci --prefix backend
    startCommand: npm run start:render --prefix backend
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        fromDatabase:
          name: zaraclone-db
          property: connectionString
